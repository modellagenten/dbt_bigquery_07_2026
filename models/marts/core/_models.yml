models:
  - name: dim_users
    config:
     materialized: table
    description: "One row per user with user master data and lifetime order metrics."
    columns:
      - name: user_id
        description: "Unique identifier of the user."
        tests:
          - unique
          - not_null
 
      - name: email
        description: "Email address of the user."
        tests:
          - not_null