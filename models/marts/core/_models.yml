version: 2

models:
  - name: dim_products
    description: "One row per product enriched with sales metrics."

    columns:
      - name: product_id
        description: "Primary key of the product."
        data_tests:
          - unique
          - not_null

      - name: category
        description: "Product category."
        data_tests:
          - not_null
  - name: dim_users
    config:
      materialized: table
    description: "One row per user with user master data and lifetime order metrics."
    columns:
        - name: user_id
          description: "Unique identifier of the user."
          tests:
            - unique
            - not_null
  
        - name: email
          description: "Email address of the user."
          tests:
            - not_null
