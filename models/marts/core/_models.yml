version: 2

models:
  - name: dim_products
    description: "One row per product enriched with sales metrics."

    columns:
      - name: product_id
        description: "Primary key of the product."
        data_tests:
          - unique
          - not_null

      - name: category
        description: "Product category."
        data_tests:
          - not_null
  - name: dim_users
    config:
      materialized: table
    description: "One row per user with user master data and lifetime order metrics."
    columns:
        - name: user_id
          description: "Unique identifier of the user."
          tests:
            - unique
            - not_null
  
        - name: email
          description: "Email address of the user."
          tests:
            - not_null
  - name: fct_orders
    description: "Eine Zeile pro Bestellung mit Revenue-, Profit- und Delivery-Kennzahlen."
    columns:
      - name: order_id
        description: "Primärschlüssel der Bestellung."
        tests:
          - unique
          - not_null
      - name: user_id
        description: "User id"
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments: 
                values: ['Complete', 'Processing', 'Shipped', 'Cancelled', 'Returned']
      - name: ordered_at
        description: "Zeitpunkt der Bestellung (Timestamp)."
        tests:
          - not_null
  - name: fct_daily_orders
    description: "Bestellungen aggregiert auf Tagesebene (Incremental)."
    columns:
      - name: order_day
        description: "Bestelldatum (Tag)."
        tests:
          - unique
          - not_null
      - name: n_orders
        tests:
          - not_null

